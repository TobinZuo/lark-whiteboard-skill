<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="950" viewBox="0 0 1500 950">
  <title>Checkout risk decision sequence</title>
  <desc>A sequence diagram showing checkout risk evaluation across client, API gateway, order service, risk service, feature store, model service, and action service.</desc>
  <defs>
    <marker id="seqArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#2563eb"/>
    </marker>
    <marker id="returnArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1500" height="950" fill="#f8fafc"/>
  <text x="72" y="72" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#17202c">Checkout Risk Decision Sequence</text>
  <text x="72" y="104" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4b5563">Request path, feature lookup, scoring, policy decision, and action result</text>

  <g id="participants">
    <rect x="80" y="145" width="160" height="68" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="160" y="185" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#17202c">Client</text>
    <rect x="290" y="145" width="170" height="68" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="375" y="185" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#17202c">API Gateway</text>
    <rect x="515" y="145" width="170" height="68" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="600" y="185" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#17202c">Order Service</text>
    <rect x="740" y="145" width="170" height="68" rx="10" fill="#eef3ff" stroke="#2563eb" stroke-width="3"/>
    <text x="825" y="185" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#17202c">Risk Service</text>
    <rect x="965" y="145" width="170" height="68" rx="10" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
    <text x="1050" y="185" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#17202c">Feature Store</text>
    <rect x="1190" y="145" width="170" height="68" rx="10" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
    <text x="1275" y="185" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#17202c">Model Service</text>
  </g>

  <g stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 8">
    <line x1="160" y1="213" x2="160" y2="860"/>
    <line x1="375" y1="213" x2="375" y2="860"/>
    <line x1="600" y1="213" x2="600" y2="860"/>
    <line x1="825" y1="213" x2="825" y2="860"/>
    <line x1="1050" y1="213" x2="1050" y2="860"/>
    <line x1="1275" y1="213" x2="1275" y2="860"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#17202c">
    <line x1="160" y1="270" x2="375" y2="270" stroke="#2563eb" stroke-width="2.4" marker-end="url(#seqArrow)"/>
    <text x="268" y="254" text-anchor="middle">Submit checkout</text>
    <line x1="375" y1="335" x2="600" y2="335" stroke="#2563eb" stroke-width="2.4" marker-end="url(#seqArrow)"/>
    <text x="488" y="319" text-anchor="middle">Create order draft</text>
    <line x1="600" y1="400" x2="825" y2="400" stroke="#2563eb" stroke-width="2.4" marker-end="url(#seqArrow)"/>
    <text x="713" y="384" text-anchor="middle">Evaluate risk</text>
    <line x1="825" y1="465" x2="1050" y2="465" stroke="#2563eb" stroke-width="2.4" marker-end="url(#seqArrow)"/>
    <text x="938" y="449" text-anchor="middle">Fetch real-time features</text>
    <line x1="1050" y1="530" x2="825" y2="530" stroke="#64748b" stroke-width="2" stroke-dasharray="8 6" marker-end="url(#returnArrow)"/>
    <text x="938" y="514" text-anchor="middle">Feature vector</text>
    <line x1="825" y1="595" x2="1275" y2="595" stroke="#2563eb" stroke-width="2.4" marker-end="url(#seqArrow)"/>
    <text x="1050" y="579" text-anchor="middle">Score transaction</text>
    <line x1="1275" y1="660" x2="825" y2="660" stroke="#64748b" stroke-width="2" stroke-dasharray="8 6" marker-end="url(#returnArrow)"/>
    <text x="1050" y="644" text-anchor="middle">Risk score and reasons</text>
    <line x1="825" y1="725" x2="600" y2="725" stroke="#64748b" stroke-width="2.4" marker-end="url(#returnArrow)"/>
    <text x="713" y="709" text-anchor="middle">Allow / verify / block</text>
    <line x1="600" y1="790" x2="375" y2="790" stroke="#64748b" stroke-width="2.4" marker-end="url(#returnArrow)"/>
    <text x="488" y="774" text-anchor="middle">Order decision</text>
    <line x1="375" y1="855" x2="160" y2="855" stroke="#64748b" stroke-width="2.4" marker-end="url(#returnArrow)"/>
    <text x="268" y="839" text-anchor="middle">Checkout result</text>
  </g>

  <rect x="735" y="380" width="180" height="320" rx="14" fill="#eef3ff" stroke="#2563eb" stroke-width="2" opacity="0.28"/>
  <text x="825" y="884" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4b5563">Risk Service owns policy orchestration and final action mapping.</text>
</svg>
