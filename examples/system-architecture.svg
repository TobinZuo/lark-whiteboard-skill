<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <title>Commerce risk system architecture</title>
  <desc>A layered architecture for commerce risk control with entry points, real-time decisioning, data and model foundation, actions, and external dependencies.</desc>
